name: LotusLamp
options:
  bundleIdPrefix: com.lotuslamp
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  LotusLamp:
    type: application
    platform: macOS
    sources:
      - path: LotusLamp
        excludes:
          - Resources/Info.plist
          - Resources/LotusLamp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotuslamp.controller
        INFOPLIST_FILE: LotusLamp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LotusLamp/Resources/LotusLamp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
