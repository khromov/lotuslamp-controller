name: MacLotus
options:
  bundleIdPrefix: se.khromov
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      DEPLOYMENT_POSTPROCESSING: "YES"
      STRIP_INSTALLED_PRODUCT: "YES"
      COPY_PHASE_STRIP: "YES"

targets:
  MacLotus:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Resources/Info.plist
          - Resources/MacLotus.entitlements
    dependencies:
      - target: maclotus-cli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: se.khromov.maclotus
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/MacLotus.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "36S2252ZTN"
        CODE_SIGNING_REQUIRED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          CODE_SIGNING_REQUIRED: "NO"
          ENABLE_HARDENED_RUNTIME: "NO"
    postCompileScripts:
      - script: |
          cp "${BUILT_PRODUCTS_DIR}/maclotus" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/maclotus"
        name: "Embed CLI Binary"
        basedOnDependencyAnalysis: false

  maclotus-cli:
    type: tool
    platform: macOS
    sources:
      - path: CLI
      - path: Sources/LampCommand.swift
        type: file
      - path: Sources/BLEConstants.swift
        type: file
      - path: Sources/PresetColor.swift
        type: file
      - path: Sources/EffectMode.swift
        type: file
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: maclotus
        PRODUCT_BUNDLE_IDENTIFIER: se.khromov.maclotus.cli
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEVELOPMENT_TEAM: "36S2252ZTN"
        CODE_SIGNING_REQUIRED: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          CODE_SIGNING_REQUIRED: "NO"
          ENABLE_HARDENED_RUNTIME: "NO"
