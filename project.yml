name: LotusLamp
options:
  bundleIdPrefix: com.lotuslamp
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

packages:
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  LotusLamp:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - Resources/Info.plist
          - Resources/LotusLamp.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lotuslamp.controller
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/LotusLamp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"

  lotuslamp-cli:
    type: tool
    platform: macOS
    sources:
      - path: CLI
      - path: Sources/LampCommand.swift
        type: file
      - path: Sources/BLEConstants.swift
        type: file
      - path: Sources/PresetColor.swift
        type: file
      - path: Sources/EffectMode.swift
        type: file
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: lotuslamp
        PRODUCT_BUNDLE_IDENTIFIER: com.lotuslamp.cli
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
